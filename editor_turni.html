<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Turni — GGNL</title>
<style>
  :root {
    --bg: #0b1c26;
    --bg-panel: #102733;
    --bg-card: #143140;
    --line: #1f4250;
    --ink: #eaf2f4;
    --ink-dim: #9fb8c2;
    --accent: #2dd4bf;
    --accent-dim: #0e3a3a;
    --bad: #ef4444;
    --bad-bg: #3a1414;
    --good: #22c55e;
    --radius: 10px;
    --d1: #3b6bcc; --d1-bg: #1a2a4a;
    --d2: #2d9e6b; --d2-bg: #142a22;
    --d3: #e07b3a; --d3-bg: #2a1a0e;
    --d4: #c45cba; --d4-bg: #2a122a;
    --dt: #e6d44a; --dt-bg: #282200;
    --bis: #5ec4d4; --bis-bg: #102a2e;
    --pond: #f08080; --pond-bg: #2a1212;
    --rip: #6b7280; --rip-bg: #1a1c22;
    --cong: #a78bfa; --cong-bg: #1e1530;
    --agb: #60a5fa; --agb-bg: #102040;
    --fp: #94a3b8; --fp-bg: #1a1e28;
    --other: #94a3b8; --other-bg: #1e2230;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 10% -10%, #123544 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #0e2a36 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  .page-header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: rgba(11, 28, 38, 0.95);
    backdrop-filter: blur(6px);
    z-index: 60;
  }
  .title-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .company-name {
    font-weight: 700; font-size: 12px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--accent);
  }
  .doc-title { font-size: 18px; font-weight: 700; color: var(--ink); }
  .doc-subtitle { color: var(--ink-dim); font-size: 12px; margin-left: auto; }

  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 24px; border-bottom: 1px solid var(--line);
  }
  .res-block { display: flex; gap: 6px; flex-wrap: wrap; }
  .res-btn {
    background: var(--bg-card); border: 1px solid var(--line); color: var(--ink-dim);
    padding: 7px 15px; border-radius: 999px; cursor: pointer; font-size: 12px;
    font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; transition: .15s;
  }
  .res-btn:hover { border-color: var(--accent); color: var(--ink); }
  .res-btn.active { background: var(--accent); color: #06201c; border-color: var(--accent); }

  .search-box {
    background: var(--bg-card); border: 1px solid var(--line); color: var(--ink);
    padding: 7px 12px; border-radius: 8px; font-size: 13px; width: 200px;
  }
  .search-box::placeholder { color: var(--ink-dim); }

  .spacer { flex: 1; }

  .btn {
    background: var(--bg-card); border: 1px solid var(--line); color: var(--ink);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px; transition: .15s;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #06201c; border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.warn { border-color: var(--bad); color: var(--bad); }

  input[type="file"] { display: none; }

  .status-bar {
    padding: 8px 24px; font-size: 12px; color: var(--ink-dim);
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  .status-bar .dirty { color: var(--warn, #f59e0b); font-weight: 600; }
  .status-bar .saved { color: var(--good); font-weight: 600; }

  .content { padding: 14px 24px 40px; }

  .scroll-wrap {
    overflow: auto;
    max-height: calc(100vh - 220px);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--bg-panel);
    width: 100%;
    cursor: grab;
  }
  .scroll-wrap.dragging { cursor: grabbing; user-select: none; }

  table { border-collapse: collapse; width: 100%; font-size: 12px; min-width: 1400px; }

  th, td { padding: 6px 4px; text-align: center; border-bottom: 1px solid var(--line); white-space: nowrap; }

  thead th {
    background: var(--bg-panel);
    color: var(--ink-dim);
    font-weight: 600;
    position: sticky;
    z-index: 5;
  }
  /* Le due righe di intestazione restano ferme in cima al riquadro scrollabile della tabella */
  .week-header th { height: 30px; top: 0; }
  .day-header th { height: 34px; top: var(--week-row-h, 30px); }

  .week-header th {
    background: var(--bg-card);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 6px 4px;
    border-left: 1px solid var(--line);
  }
  .week-header th.wk-odd { background: #0d232e; }

  .day-header th {
    font-size: 10px; color: var(--ink-dim); padding: 4px 4px;
  }
  .day-header th .dn { display: block; text-transform: uppercase; }
  .day-header th .dd { display: block; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink); margin-top: 1px; }
  th.dom, td.dom { background: rgba(239, 68, 68, 0.05); }

  td.col-id { color: var(--ink-dim); font-size: 11px; }
  td.col-agente {
    text-align: left; font-weight: 600; font-size: 12.5px; cursor: pointer;
  }
  td.col-agente:hover { color: var(--accent) !important; }
  /* Colonne fisse: id e nome agente, sia in thead che in tbody */
  th.col-id, td.col-id, th.col-agente, td.col-agente {
    position: sticky; background: var(--bg-panel); z-index: 4;
  }
  th.col-id, td.col-id { left: 0; width: 40px; min-width: 40px; }
  th.col-agente, td.col-agente { left: 40px; width: 150px; min-width: 150px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  /* Celle d'angolo: ferme sia in alto che a sinistra, sopra a tutto */
  thead th.col-id, thead th.col-agente {
    z-index: 8; top: 0;
  }

  tbody tr:hover td { background: rgba(45, 212, 191, 0.05); }
  tbody tr:hover td.col-id, tbody tr:hover td.col-agente { background: #123240; }

  /* Riga pinnata in cima, stesso comportamento di desenzano.html */
  tbody tr.pinned-row td {
    background: rgba(45, 212, 191, 0.12) !important;
  }
  tbody tr.pinned-row {
    border-bottom: 2px solid var(--accent);
  }
  tbody tr.pinned-row td.col-agente {
    color: var(--accent) !important;
    font-weight: 700;
  }
  tbody tr.pinned-row td.col-agente::before {
    content: "📌 ";
    font-size: 10px;
  }

  .cell-pill {
    display: inline-block; padding: 3px 7px; border-radius: 4px; font-weight: 600;
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.3px;
    cursor: pointer; min-width: 30px; border: 1px solid transparent;
  }
  .cell-pill:hover { border-color: var(--accent); }
  .cell-pill.edited { box-shadow: 0 0 0 1px var(--accent) inset; }

  .c-d1 { color: var(--d1); background: var(--d1-bg); }
  .c-d2 { color: var(--d2); background: var(--d2-bg); }
  .c-d3 { color: var(--d3); background: var(--d3-bg); }
  .c-d4 { color: var(--d4); background: var(--d4-bg); }
  .c-dt { color: var(--dt); background: var(--dt-bg); }
  .c-bis { color: var(--bis); background: var(--bis-bg); }
  .c-pond { color: var(--pond); background: var(--pond-bg); }
  .c-rip { color: var(--rip); background: var(--rip-bg); }
  .c-cong { color: var(--cong); background: var(--cong-bg); }
  .c-agb { color: var(--agb); background: var(--agb-bg); }
  .c-fp { color: var(--fp); background: var(--fp-bg); }
  .c-other { color: var(--other); background: var(--other-bg); }

  .cell-edit-input {
    width: 56px; background: var(--bad-bg); border: 1px solid var(--bad); color: var(--ink);
    border-radius: 4px; padding: 3px 4px; font-size: 11px; text-align: center;
    text-transform: uppercase; font-weight: 600;
  }
  .cell-edit-input:focus { outline: none; border-color: var(--accent); }

  .empty-hint { padding: 40px; text-align: center; color: var(--ink-dim); font-size: 13px; }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 4px 24px 14px; }
  .legend span { font-size: 10px; }
</style>
</head>

  let originalDataStr = JSON.stringify(DATA);

  const nomiGiorni = ["Lun", "Mar", "Mer", "Gio", "Ven", "Sab", "Dom"];

  function ottieniTurnoPulito(v) {
    if (!v) return "";
    let txt = String(v).toUpperCase().trim().replace(/\*/g, "").replace(/--/g, "");
    if (txt === "" || txt === "RIP" || txt === "RIP." || txt === "----") return "";
    let match = txt.match(/(?:^C)?([DRMP]\d|BIS|POND|T1|M1|DT|T2|CAR|CAP|SR1)(?:C|$)/i);
    if (match && match[1]) return match[1].toUpperCase();
    return txt;
  }

  function classify(v) {
    if (!v || v === "") return "c-rip";
    let u = ottieniTurnoPulito(v);
    if (u === "") return "c-rip";
    if (/^D1/.test(u) || /^R1/.test(u) || /^P1/.test(u)) return "c-d1";
    if (/^D2/.test(u) || /^R2/.test(u) || /^P2/.test(u)) return "c-d2";
    if (/^D3/.test(u) || /^R3/.test(u) || /^P3/.test(u)) return "c-d3";
    if (/^D4/.test(u) || /^R4/.test(u) || /^P4/.test(u)) return "c-d4";
    if (/^DT/.test(u) || u === "T2" || /^T1/.test(u) || /^M1/.test(u)) return "c-dt";
    if (/^BIS/.test(u)) return "c-bis";
    if (/^POND/.test(u)) return "c-pond";
    if (/^AGB/.test(u)) return "c-agb";
    if (u.startsWith("CONG") || u === "CON;") return "c-cong";
    if (u === "FP" || u === "F.P." || u === "CORSO") return "c-fp";
    return "c-other";
  }

  // ---------- CALENDARIO ----------
  function parseWeekKey(key) {
    // settimana_22-06_al_28-06
    const m = key.match(/settimana_(\d{2})-(\d{2})_al_(\d{2})-(\d{2})/);
    if (!m) return { label: key, startDay: 1, startMonth: 1 };
    return { startDay: parseInt(m[1]), startMonth: parseInt(m[2]), endDay: parseInt(m[3]), endMonth: parseInt(m[4]) };
  }

  function buildCalendar(weekKeys) {
    // determina anno dal periodo, fallback anno corrente
    let year = new Date().getFullYear();
    const periodo = DATA.periodo || "";
    const ym = periodo.match(/(\d{4})/);
    if (ym) year = parseInt(ym[1]);
    return weekKeys.map(key => {
      const info = parseWeekKey(key);
      const base = new Date(year, info.startMonth - 1, info.startDay);
      const days = [];
      for (let g = 0; g < 7; g++) {
        const d = new Date(base);
        d.setDate(base.getDate() + g);
        days.push({ dayNum: d.getDate(), giornoSett: nomiGiorni[g], isDomenica: g === 6 });
      }
      return { key, info, days, label: `${String(info.startDay).padStart(2,'0')}-${String(info.startMonth).padStart(2,'0')} al ${String(info.endDay).padStart(2,'0')}-${String(info.endMonth).padStart(2,'0')}` };
    });
  }

  // ---------- RACCOLTA CODICI ----------
  function collectAllCodes() {
    const set = new Set();
    Object.values(DATA.residenze).forEach(agents => {
      agents.forEach(a => {
        Object.values(a.turni_settimanali).forEach(week => {
          week.forEach(v => { if (v !== undefined && v !== null && String(v).trim() !== "") set.add(String(v)); });
        });
      });
    });
    return Array.from(set).sort();
  }

  function ensureDatalist() {
    let dl = document.getElementById("turni-datalist");
    if (!dl) {
      dl = document.createElement("datalist");
      dl.id = "turni-datalist";
      document.body.appendChild(dl);
    }
    const codes = collectAllCodes();
    dl.innerHTML = codes.map(c => `<option value="${escapeHtml(c)}"></option>`).join("");
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // ---------- RENDER ----------
  function renderResBlock() {
    const block = document.getElementById("res-block");
    const names = Object.keys(DATA.residenze);
    if (!currentRes) currentRes = names[0];
    block.innerHTML = names.map(n =>
      `<button class="res-btn ${n === currentRes ? 'active' : ''}" data-res="${escapeHtml(n)}">${escapeHtml(n)} <span style="opacity:.6">(${DATA.residenze[n].length})</span></button>`
    ).join("");
    block.querySelectorAll(".res-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.dataset.res === currentRes) return;
        currentRes = btn.dataset.res;
        pinnedAgentId = null;
        renderAll();
      });
    });
  }

  function renderHeader(weeks) {
    const container = document.getElementById("thead-container");
    let html = `<tr class="week-header">
      <th class="stub col-id" rowspan="2">#</th>
      <th class="stub col-agente" rowspan="2" style="text-align:left;padding-left:6px;">Agente</th>`;
    weeks.forEach((w, idx) => {
      html += `<th class="${idx % 2 === 0 ? 'wk-even' : 'wk-odd'}" colspan="7">Sett. ${w.label}</th>`;
    });
    html += `</tr><tr class="day-header">`;
    weeks.forEach(w => {
      w.days.forEach(d => {
        html += `<th ${d.isDomenica ? 'class="dom"' : ''}><span class="dn">${d.giornoSett}</span><span class="dd">${d.dayNum}</span></th>`;
      });
    });
    html += `</tr>`;
    container.innerHTML = html;
    // misura l'altezza reale della prima riga per posizionare correttamente la seconda
    requestAnimationFrame(() => {
      const weekRow = container.querySelector(".week-header");
      if (weekRow) {
        document.documentElement.style.setProperty("--week-row-h", weekRow.offsetHeight + "px");
      }
    });
  }

  function pillHtml(val, res, agentId, weekKey, dayIdx) {
    const display = (val === undefined || val === null || String(val).trim() === "") ? "----" : val;
    const cls = classify(val);
    const isEdited = editedCells.has(`${res}|${agentId}|${weekKey}|${dayIdx}`);
    return `<span class="cell-pill ${cls} ${isEdited ? 'edited' : ''}" data-res="${escapeHtml(res)}" data-agent="${escapeHtml(agentId)}" data-week="${escapeHtml(weekKey)}" data-day="${dayIdx}">${escapeHtml(display)}</span>`;
  }

  function renderBody(weeks) {
    const tbody = document.getElementById("tbody-container");
    const agents = DATA.residenze[currentRes] || [];
    const searchTerm = document.getElementById("search-box").value.trim().toUpperCase();
    let filtered = searchTerm ? agents.filter(a => a.agente.toUpperCase().includes(searchTerm)) : agents.slice();

    document.getElementById("empty-hint").style.display = filtered.length === 0 ? "block" : "none";
    document.getElementById("scroll-wrap").style.display = filtered.length === 0 ? "none" : "block";

    // porta l'agente pinnato in cima, se presente nella lista filtrata
    if (pinnedAgentId !== null) {
      const pinIdx = filtered.findIndex(a => a.id === pinnedAgentId);
      if (pinIdx > 0) {
        const [pinnedAgent] = filtered.splice(pinIdx, 1);
        filtered.unshift(pinnedAgent);
      }
    }

    let html = "";
    filtered.forEach(agent => {
      const isPinned = agent.id === pinnedAgentId;
      html += `<tr class="${isPinned ? 'pinned-row' : ''}"><td class="col-id">${escapeHtml(agent.id)}</td><td class="col-agente" data-agent-id="${escapeHtml(agent.id)}" title="Clicca per pinnare in cima">${escapeHtml(agent.agente)}</td>`;
      weeks.forEach(w => {
        const arr = agent.turni_settimanali[w.key] || [];
        for (let d = 0; d < 7; d++) {
          const val = arr[d];
          html += `<td ${w.days[d].isDomenica ? 'class="dom"' : ''}>${pillHtml(val, currentRes, agent.id, w.key, d)}</td>`;
        }
      });
      html += `</tr>`;
    });
    tbody.innerHTML = html;

    tbody.querySelectorAll(".cell-pill").forEach(pill => {
      pill.addEventListener("click", onPillClick);
    });
    tbody.querySelectorAll(".col-agente").forEach(cell => {
      cell.addEventListener("click", () => {
        const id = cell.dataset.agentId;
        pinnedAgentId = (pinnedAgentId === id) ? null : id;
        renderBody(weeks);
      });
    });
  }

  function onPillClick(e) {
    const pill = e.currentTarget;
    if (pill.querySelector("input")) return;
    const res = pill.dataset.res, agentId = pill.dataset.agent, weekKey = pill.dataset.week, dayIdx = parseInt(pill.dataset.day);
    const agent = DATA.residenze[res].find(a => a.id === agentId);
    const currentVal = (agent.turni_settimanali[weekKey] || [])[dayIdx] || "";

    const input = document.createElement("input");
    input.type = "text";
    input.className = "cell-edit-input";
    input.value = currentVal;
    input.setAttribute("list", "turni-datalist");
    pill.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      const newVal = input.value.trim();
      if (!agent.turni_settimanali[weekKey]) agent.turni_settimanali[weekKey] = [];
      agent.turni_settimanali[weekKey][dayIdx] = newVal;
      editedCells.add(`${res}|${agentId}|${weekKey}|${dayIdx}`);
      updateStatus();
      ensureDatalist();
      const newPill = document.createElement("span");
      newPill.outerHTML = pillHtml(newVal, res, agentId, weekKey, dayIdx);
      input.replaceWith(document.createRange().createContextualFragment(pillHtml(newVal, res, agentId, weekKey, dayIdx)));
      // riattacca listener
      const parentCell = input.parentNode;
    }

    input.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") { input.blur(); }
      if (ev.key === "Escape") { input.value = currentVal; input.blur(); }
    });
    input.addEventListener("blur", () => {
      const newVal = input.value.trim();
      if (!agent.turni_settimanali[weekKey]) agent.turni_settimanali[weekKey] = [];
      agent.turni_settimanali[weekKey][dayIdx] = newVal;
      editedCells.add(`${res}|${agentId}|${weekKey}|${dayIdx}`);
      updateStatus();
      ensureDatalist();
      const frag = document.createElement("span");
      frag.outerHTML = pillHtml(newVal, res, agentId, weekKey, dayIdx);
      const newPillHtmlStr = pillHtml(newVal, res, agentId, weekKey, dayIdx);
      const temp = document.createElement("tbody");
      temp.innerHTML = `<tr><td>${newPillHtmlStr}</td></tr>`;
      const newPill = temp.querySelector(".cell-pill");
      newPill.addEventListener("click", onPillClick);
      input.replaceWith(newPill);
    }, { once: true });
  }

  function updateStatus() {
    const statusText = document.getElementById("status-text");
    const countText = document.getElementById("count-text");
    if (editedCells.size === 0) {
      statusText.textContent = "Nessuna modifica";
      statusText.className = "";
    } else {
      statusText.textContent = `${editedCells.size} turno${editedCells.size > 1 ? 'i' : ''} modificat${editedCells.size > 1 ? 'i' : 'o'}`;
      statusText.className = "dirty";
    }
    let total = 0;
    Object.values(DATA.residenze).forEach(a => total += a.length);
    countText.textContent = `Totale agenti: ${total}`;
  }

  function renderAll() {
    renderResBlock();
    const agents = DATA.residenze[currentRes] || [];
    const weekKeys = agents.length ? Object.keys(agents[0].turni_settimanali) : [];
    const weeks = buildCalendar(weekKeys);
    renderHeader(weeks);
    renderBody(weeks);
    document.getElementById("doc-title").textContent = DATA.titolo || "Editor Turni";
    document.getElementById("doc-subtitle").textContent = DATA.periodo || "";
    ensureDatalist();
    updateStatus();
  }

  // ---------- DRAG TO SCROLL ----------
  (function initDrag() {
    const wrap = document.getElementById("scroll-wrap");
    let isDown = false, startX, scrollLeft;
    wrap.addEventListener("mousedown", (e) => {
      if (e.target.closest(".cell-pill") || e.target.tagName === "INPUT") return;
      isDown = true;
      wrap.classList.add("dragging");
      startX = e.pageX - wrap.offsetLeft;
      scrollLeft = wrap.scrollLeft;
    });
    window.addEventListener("mouseup", () => { isDown = false; wrap.classList.remove("dragging"); });
    wrap.addEventListener("mousemove", (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - wrap.offsetLeft;
      wrap.scrollLeft = scrollLeft - (x - startX) * 1.5;
    });
  })();

  // ---------- FILE LOAD ----------
  document.getElementById("file-input").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const parsed = JSON.parse(evt.target.result);
        if (!parsed.residenze) throw new Error("Formato non valido: manca 'residenze'");
        DATA = parsed;
        originalDataStr = JSON.stringify(DATA);
        editedCells.clear();
        pinnedAgentId = null;
        currentRes = Object.keys(DATA.residenze)[0];
        renderAll();
      } catch (err) {
        alert("Errore nel file JSON: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  // ---------- RESET ----------
  document.getElementById("reset-btn").addEventListener("click", () => {
    if (editedCells.size === 0) return;
    if (!confirm("Annullare tutte le modifiche non salvate?")) return;
    DATA = JSON.parse(originalDataStr);
    editedCells.clear();
    renderAll();
  });

  // ---------- DOWNLOAD ----------
  document.getElementById("download-btn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const ts = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `turni_finali_modificato_${ts}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  // ---------- SEARCH ----------
  document.getElementById("search-box").addEventListener("input", () => {
    const agents = DATA.residenze[currentRes] || [];
    const weekKeys = agents.length ? Object.keys(agents[0].turni_settimanali) : [];
    const weeks = buildCalendar(weekKeys);
    renderBody(weeks);
  });

  // ---------- INIT ----------
  renderAll();
</script>
</body>
</html>
