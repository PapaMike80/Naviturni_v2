<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODS Manager v5</title>

<style>
body{
    background:#0f1117;
    color:#d6dce8;
    font-family:Arial,sans-serif;
    padding:20px;
}

/* TOOLBAR */
.toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input, select{
    padding:6px;
    border-radius:5px;
    border:1px solid #333;
    background:#1a1f2c;
    color:white;
}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

/* TABLE STYLE (NAVITURNI STYLE) */
table{
    border-collapse:separate;
    border-spacing:0;
    width:max-content;
    min-width:100%;
}

/* HEADER STICKY */
th{
    position:sticky;
    top:0;
    z-index:5;
    background:#1a2235;
    padding:8px;
    border-bottom:2px solid #2f3a55;
    font-size:12px;
}

/* FIRST COLUMN STICKY */
td:first-child, th:first-child{
    position:sticky;
    left:0;
    z-index:6;
    background:#111827;
    border-right:2px solid #2f3a55;
}

/* CELLS */
td{
    padding:6px;
    text-align:center;
    border-bottom:1px solid #222;
    border-right:1px solid #1f2937;
    font-size:13px;
    cursor:pointer;
}

/* WEEK SEPARATION */
.week-start{
    border-left:3px solid #60a5fa !important;
}

/* DAYS HEADER STYLE */
.giorno{
    font-size:11px;
    opacity:0.7;
}

/* RIPOSI */
.riposo{
    background:#2b1b1b;
    color:#ff6b6b;
    font-weight:bold;
}

/* MODIFIED */
.modified{
    outline:2px solid #facc15;
}

/* PICKER */
#picker{
    position:absolute;
    background:#0f172a;
    border:1px solid #334155;
    padding:8px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    z-index:9999;
    border-radius:8px;
}

#picker button{
    padding:6px;
    font-size:12px;
    background:#1e293b;
    border:1px solid #334155;
}
#picker button:hover{
    background:#3b82f6;
}
</style>
</head>

<body>

<div class="toolbar">
<select id="residenza"></select>
<input id="search" placeholder="🔎 cerca agente" oninput="render()">
</div>

<div style="overflow:auto; max-height:75vh;">
<table id="tabella"></table>
</div>

<script>

let data=null;
let modifiche=[];
let picker=null;

const startDate=new Date("2026-06-22");

const turni=[
"D1","D2","D3","D4",
"BIS","DT",
"P1","P2","P3","P4",
"R1","R2","R3","R4",
"T1","T2","M1",
"POND","CONG","FP","RIP"
];

async function init(){

    const r=await fetch("turni_finali.json");
    data=await r.json();

    const sel=document.getElementById("residenza");

    Object.keys(data.residenze).forEach(k=>{
        const o=document.createElement("option");
        o.value=k;
        o.textContent=k;
        sel.appendChild(o);
    });

    sel.onchange=render;

    render();
}

function render(){

    const res=document.getElementById("residenza").value;
    if(!res) return;

    const filtro=document.getElementById("search").value.toLowerCase();

    const persone=data.residenze[res]
        .filter(p=>p.agente.toLowerCase().includes(filtro));

    const keys=Object.keys(persone[0].turni_settimanali);

    let html="<tr><th>Agente</th>";

    let giorni=[];

    keys.forEach((w,wi)=>{

        for(let d=0;d<7;d++){

            const date=new Date(startDate);
            date.setDate(startDate.getDate()+(wi*7)+d);

            const nomeGiorno=date.toLocaleDateString("it-IT",{weekday:"short"});

            giorni.push({w,d});

            html+=`<th>
                <div>${nomeGiorno}</div>
                <div class="giorno">${date.toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"})}</div>
            </th>`;
        }
    });

    html+="</tr>";

    persone.forEach(p=>{

        html+="<tr>";
        html+=`<td>${p.agente}</td>`;

        giorni.forEach((g,i)=>{

            const val=p.turni_settimanali[g.w][g.d];

            const isRip=["RIP","FP","CONG"].includes(val);
            const isWeek=i%7===0;

            html+=`
            <td
                class="${isRip?'riposo':''} ${isWeek?'week-start':''}"
                onclick="openPicker(event,this,'${p.agente}',${p.id},'${g.w}',${g.d})">
                ${val}
            </td>`;
        });

        html+="</tr>";
    });

    document.getElementById("tabella").innerHTML=html;
}

/* PICKER VELOCE */
function openPicker(e,td,nome,id,w,d){

    closePicker();

    picker=document.createElement("div");
    picker.id="picker";

    turni.forEach(t=>{
        const b=document.createElement("button");
        b.textContent=t;

        b.onclick=()=>{
            td.textContent=t;
            td.classList.add("modified");

            closePicker();
        };

        picker.appendChild(b);
    });

    document.body.appendChild(picker);

    picker.style.left=e.pageX+"px";
    picker.style.top=e.pageY+"px";
}

function closePicker(){
    if(picker){
        picker.remove();
        picker=null;
    }
}

document.addEventListener("click",(e)=>{
    if(picker && !picker.contains(e.target)) closePicker();
});

init();

</script>

</body>
</html>
