<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODS Manager v2</title>

<style>
body{
    background:#0f1117;
    color:#d6dce8;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{ margin-bottom:15px; }

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
}

input, select{
    padding:6px;
    border-radius:4px;
    border:1px solid #333;
    background:#1a1f2c;
    color:white;
}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{ opacity:0.9; }

table{
    border-collapse:collapse;
    width:100%;
    background:#181c26;
}

th,td{
    border:1px solid #2a2f3e;
    padding:6px;
    text-align:center;
    white-space:nowrap;
}

th{
    background:#1a2235;
}

.nome{
    text-align:left;
    min-width:220px;
}

.modified{
    background:#665500 !important;
}

#log{
    margin-top:20px;
    background:#181c26;
    padding:10px;
    border-radius:6px;
}
.log-item{
    padding:4px;
    border-bottom:1px solid #333;
    font-size:13px;
}
.small{
    font-size:12px;
    opacity:0.8;
}
</style>
</head>

<body>

<h1>📝 ODS Manager v2</h1>

<div class="toolbar">

<select id="residenza"></select>

<input id="search" placeholder="🔎 Cerca agente..." oninput="render()" />

<label>
<input type="checkbox" id="soloModificati" onchange="render()" />
Solo modificati
</label>

<button onclick="undoLast()">↩️ Undo</button>
<button onclick="exportODS()">📥 Export JSON</button>
<button onclick="resetAll()">🧹 Reset</button>

</div>

<div style="overflow:auto">
<table id="tabella"></table>
</div>

<div id="log">
<h3>Modifiche</h3>
<div id="logContent"></div>
</div>

<script>

let globalData = null;
let modifiche = [];

const dataInizio = new Date("2026-06-22");

const turniDisponibili = [
"D1","D2","D3","D4",
"BIS","DT",
"P1","P2","P3","P4",
"R1","R2","R3","R4",
"T1","T2","M1",
"POND","CONG","FP","RIP"
];

async function init(){

    const salvate = localStorage.getItem("ods_modifiche");
    if (salvate) modifiche = JSON.parse(salvate);

    const res = await fetch("turni_finali.json");
    globalData = await res.json();

    const select = document.getElementById("residenza");

    Object.keys(globalData.residenze).forEach(r=>{
        const opt = document.createElement("option");
        opt.value = r;
        opt.textContent = r;
        select.appendChild(opt);
    });

    select.addEventListener("change", render);

    render();
}

function render(){

    const res = document.getElementById("residenza").value;
    if(!res) return;

    const personale = globalData.residenze[res];

    const filtro = document.getElementById("search").value.toLowerCase();
    const soloMod = document.getElementById("soloModificati").checked;

    let personaleFiltrato = personale.filter(p =>
        p.agente.toLowerCase().includes(filtro)
    );

    if(soloMod){
        const ids = new Set(modifiche.map(m => m.matricola));
        personaleFiltrato = personaleFiltrato.filter(p => ids.has(p.id));
    }

    let html = "<tr><th>Nome</th>";

    let giorni = [];

    Object.keys(personale[0].turni_settimanali).forEach((sett, idxSettimana)=>{

        for(let i=0;i<7;i++){

            const data = new Date(dataInizio);
            data.setDate(dataInizio.getDate() + (idxSettimana * 7) + i);

            giorni.push({
                week:sett,
                day:i,
                label:data.toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"})
            });

            html += `<th>${giorni[giorni.length-1].label}</th>`;
        }
    });

    html += "</tr>";

    personaleFiltrato.forEach(persona=>{

        html += `<tr>`;
        html += `<td class="nome">${persona.id} - ${persona.agente}</td>`;

        giorni.forEach(g=>{

            const valore = persona.turni_settimanali[g.week][g.day];

            html += `
            <td>
            <select onchange="aggiornaTurno(${persona.id},'${persona.agente}','${g.week}',${g.day},this)">
            ${turniDisponibili.map(t=>
                `<option ${t===valore?'selected':''}>${t}</option>`
            ).join("")}
            </select>
            </td>`;
        });

        html += `</tr>`;
    });

    document.getElementById("tabella").innerHTML = html;
}

function aggiornaTurno(id,nome,week,day,select){

    const val = select.value;

    modifiche.push({
        matricola:id,
        nome,
        settimana:week,
        giorno:day,
        turno:val,
        ts:Date.now()
    });

    select.classList.add("modified");

    localStorage.setItem("ods_modifiche", JSON.stringify(modifiche));

    aggiornaLog();
}

function aggiornaLog(){

    document.getElementById("logContent").innerHTML =
    modifiche.slice(-50).reverse().map(m=>`
        <div class="log-item">
            ${m.nome} → ${m.turno}
            <div class="small">${m.settimana} giorno ${m.giorno}</div>
        </div>
    `).join("");
}

function undoLast(){
    modifiche.pop();
    localStorage.setItem("ods_modifiche", JSON.stringify(modifiche));
    aggiornaLog();
    render();
}

function resetAll(){
    modifiche = [];
    localStorage.removeItem("ods_modifiche");
    aggiornaLog();
    render();
}

function exportODS(){
    const blob = new Blob([JSON.stringify(modifiche,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "ods_modifiche.json";
    a.click();
}

init();

</script>

</body>
</html>
