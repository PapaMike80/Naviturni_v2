<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODS Manager v3</title>

<style>
body{
    background:#0f1117;
    color:#d6dce8;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{ margin-bottom:15px; }

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
}

input, select{
    padding:6px;
    border-radius:4px;
    border:1px solid #333;
    background:#1a1f2c;
    color:white;
}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:4px;
    cursor:pointer;
}

table{
    border-collapse:collapse;
    width:max-content;
    min-width:100%;
    background:#181c26;
}

th,td{
    border:1px solid #2a2f3e;
    padding:6px;
    text-align:center;
    white-space:nowrap;
    cursor:pointer;
}

th{
    position:sticky;
    top:0;
    background:#1a2235;
    z-index:3;
}

td:first-child, th:first-child{
    position:sticky;
    left:0;
    background:#111827;
    z-index:4;
}

th:first-child{ z-index:5; }

.nome{
    text-align:left;
    min-width:220px;
}

.modified{
    outline:2px solid #facc15;
}

.riposo{
    background:#2b1b1b !important;
    color:#ff6b6b;
    font-weight:bold;
}

#log{
    margin-top:20px;
    background:#181c26;
    padding:10px;
    border-radius:6px;
}

.log-item{
    padding:4px;
    border-bottom:1px solid #333;
    font-size:13px;
}

.small{
    font-size:11px;
    opacity:0.7;
}
</style>
</head>

<body>

<h1>📝 ODS Manager v3</h1>

<div class="toolbar">

<select id="residenza"></select>

<input id="search" placeholder="🔎 Cerca agente..." oninput="render()" />

<label>
<input type="checkbox" id="soloModificati" onchange="render()" />
Solo modificati
</label>

<button onclick="undoLast()">↩️ Undo</button>
<button onclick="exportODS()">📥 Export</button>
<button onclick="resetAll()">🧹 Reset</button>

</div>

<div style="overflow:auto; max-height:75vh;">
<table id="tabella"></table>
</div>

<div id="log">
<h3>Modifiche</h3>
<div id="logContent"></div>
</div>

<script>

let globalData=null;
let modifiche=[];

const dataInizio=new Date("2026-06-22");

const turniDisponibili=[
"D1","D2","D3","D4",
"BIS","DT",
"P1","P2","P3","P4",
"R1","R2","R3","R4",
"T1","T2","M1",
"POND","CONG","FP","RIP"
];

async function init(){

    const saved=localStorage.getItem("ods_modifiche");
    if(saved) modifiche=JSON.parse(saved);

    const res=await fetch("turni_finali.json");
    globalData=await res.json();

    const sel=document.getElementById("residenza");

    Object.keys(globalData.residenze).forEach(r=>{
        const opt=document.createElement("option");
        opt.value=r;
        opt.textContent=r;
        sel.appendChild(opt);
    });

    sel.addEventListener("change",render);

    render();
}
.week-start {
    border-left: 3px solid #60a5fa !important;
}
function render(){

    const res=document.getElementById("residenza").value;
    if(!res) return;

    const personale=globalData.residenze[res];

    const filtro=document.getElementById("search").value.toLowerCase();
    const solo=document.getElementById("soloModificati").checked;

    let lista=personale.filter(p=>
        p.agente.toLowerCase().includes(filtro)
    );

    if(solo){
        const ids=new Set(modifiche.map(m=>m.matricola));
        lista=lista.filter(p=>ids.has(p.id));
    }

    let html="<tr><th>Nome</th>";

    let giorni=[];

    Object.keys(personale[0].turni_settimanali).forEach((sett,idx)=>{

        for(let i=0;i<7;i++){

            const d=new Date(dataInizio);
            d.setDate(dataInizio.getDate()+(idx*7)+i);

            const label=d.toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"});

            giorni.push({week:sett,day:i,label});

            html+=`<th>${label}</th>`;
        }
    });
 
    html+="</tr>";

    lista.forEach(p=>{

        html+=`<tr>`;
        html+=`<td class="nome">${p.id} - ${p.agente}</td>`;

        giorni.forEach((g, index) => {

    const val = p.turni_settimanali[g.week][g.day];

    const isRiposo = ["RIP","FP","CONG"].includes(val);

    const isWeekStart = (index % 7 === 0);

    html += `
    <td
        class="${isRiposo?'riposo':''} ${isWeekStart?'week-start':''}"
        onclick="cycle(this,${p.id},'${p.agente}','${g.week}',${g.day})">
        ${val}
    </td>`;
});

function cycle(td,id,nome,week,day){

    const current = td.textContent.trim();

    const idx = turniDisponibili.indexOf(current);
    const next = turniDisponibili[(idx+1)%turniDisponibili.length];

    td.textContent = next;
    td.classList.add("modified");

    modifiche.push({
        matricola:id,
        nome,
        settimana:week,
        giorno:day,
        turno:next,
        ts:Date.now()
    });

    localStorage.setItem("ods_modifiche",JSON.stringify(modifiche));

    aggiornaLog();
}
function aggiornaLog(){

    document.getElementById("logContent").innerHTML=
    modifiche.slice(-50).reverse().map(m=>`
        <div class="log-item">
            ${m.nome} → ${m.turno}
            <div class="small">${m.settimana} g${m.giorno}</div>
        </div>
    `).join("");
}

function undoLast(){
    modifiche.pop();
    localStorage.setItem("ods_modifiche",JSON.stringify(modifiche));
    aggiornaLog();
    render();
}

function resetAll(){
    modifiche=[];
    localStorage.removeItem("ods_modifiche");
    aggiornaLog();
    render();
}

function exportODS(){
    const blob=new Blob([JSON.stringify(modifiche,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="ods_modifiche.json";
    a.click();
}

init();

</script>

</body>
</html>
