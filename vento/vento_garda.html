<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vento Lago di Garda</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0d1b2a;
    color:#e0e6ed;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#7fd1ff;
}

.updated{
    text-align:center;
    color:#9aa7b2;
    margin-bottom:20px;
    font-size:.9em;
}

table{
    width:100%;
    max-width:950px;
    margin:auto;
    border-collapse:collapse;
    background:#13263b;
    box-shadow:0 0 15px rgba(0,0,0,.4);
}

th,td{
    padding:10px 14px;
    border-bottom:1px solid #1f3a52;
    text-align:center;
}

th{
    background:#0f2a44;
    color:#7fd1ff;
}

tr:hover{
    background:#1a3552;
}

a{
    color:#7fd1ff;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}

.wind-low{
    color:#8be9a3;
    font-weight:bold;
}

.wind-mid{
    color:#ffd166;
    font-weight:bold;
}

.wind-high{
    color:#ff6b6b;
    font-weight:bold;
}

.source{
    margin-top:20px;
    text-align:center;
    font-size:.85em;
    color:#7c8b98;
}
</style>

</head>

<body>

<h1>🌬️ Vento - Lago di Garda</h1>

<div class="updated" id="updated">
Caricamento...
</div>

<table>

<thead>
<tr>
<th>Stazione</th>
<th>Vento</th>
<th>Direzione</th>
<th>Raffica</th>
<th>Ora raffica</th>
<th>Ultima rilevazione</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

</table>

<div class="source">
Aggiornamento automatico ogni 5 minuti
</div>

<script>

const stationLinks = {

"Desenzano":"https://www.meteopassione.com/stazioni/desenzano",

"Peschiera":"https://www.meteonetwork.eu/it/weather-station/vnt259-stazione-meteorologica-di-peschiera-del-garda",

"Salò":"https://www.meteopassione.com/stazioni/salo-lago-di-garda",

"Toscolano":"https://www.meteopassione.com/stazioni/museo-della-carta-toscolano-maderno",

"Gargnano":"https://www.circolovelagargnano.it/",

"Campione del Garda":"https://www.meteopassione.com/stazioni/campione",

"Malcesine":"https://stazioni.meteoproject.it/dati/malcesine/"

};

function windClass(v){

    if(v>=15) return "wind-high";

    if(v>=8) return "wind-mid";

    return "wind-low";

}

async function loadData(){

    const response = await fetch("vento.json?t="+Date.now());

    const data = await response.json();

    document.getElementById("updated").innerHTML =
        "Ultimo aggiornamento: <b>"+data.updated+"</b>";

    const tbody=document.getElementById("tbody");

    tbody.innerHTML="";

    data.stations.forEach(st=>{

        tbody.innerHTML+=`

<tr>

<td>
<a href="${stationLinks[st.name]}" target="_blank">
${st.name}
</a>
</td>

<td class="${windClass(st.wind)}">
${st.wind.toFixed(1)} kn
</td>

<td>${st.dir}</td>

<td class="${windClass(st.max)}">
${st.max.toFixed(1)} kn
</td>

<td>${st.maxTime}</td>

<td>${st.last}</td>

</tr>

`;

    });

}

loadData();

setInterval(loadData,300000);

</script>

</body>
</html>
