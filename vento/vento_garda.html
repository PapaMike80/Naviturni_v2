<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Vento - Stazioni Lago di Garda</title>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background:#0d1b2a;
    color:#e0e6ed;
    margin:0;
    padding:20px;
  }

  h1 {
    text-align:center;
    color:#7fd1ff;
    margin-bottom:10px;
  }

  .updated {
    text-align:center;
    color:#9aa7b2;
    margin-bottom:20px;
    font-size:0.9em;
  }

  table {
    width:100%;
    max-width:900px;
    margin:0 auto;
    border-collapse:collapse;
    background:#13263b;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
    border-radius:8px;
    overflow:hidden;
  }

  th, td {
    padding:12px 14px;
    text-align:center;
    border-bottom:1px solid #1f3a52;
  }

  th {
    background:#0f2a44;
    color:#7fd1ff;
  }

  tr:hover {
    background:#1a3552;
  }

  .wind-high { color:#ff6b6b; font-weight:bold; }
  .wind-mid  { color:#ffd166; font-weight:bold; }
  .wind-low  { color:#8be9a3; font-weight:bold; }

  .source {
    text-align:center;
    margin-top:20px;
    font-size:0.8em;
    color:#6c7a89;
  }

  .loading {
    text-align:center;
    color:#9aa7b2;
    margin-top:10px;
  }
</style>
</head>

<body>

<h1>🌬️ Vento - Stazioni Lago di Garda</h1>

<div class="updated">Caricamento dati...</div>

<table id="windTable">
  <thead>
    <tr>
      <th>Stazione</th>
      <th>Vento (kn)</th>
      <th>Direzione</th>
      <th>Raffica max (kn)</th>
      <th>Ora max</th>
      <th>Ultimo aggiornamento</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="source">
  Dati meteo Lago di Garda · aggiornamento automatico ogni 5 minuti
</div>

<script>

/* ---------------- CORE UPDATE ---------------- */

async function aggiorna() {

  try {

    const res = await fetch("vento.json?t=" + Date.now());
    const data = await res.json();

    document.querySelector(".updated").innerText =
      "Ultimo aggiornamento: " + data.updated;

    const tbody = document.querySelector("#windTable tbody");
    tbody.innerHTML = "";

    data.stations.forEach(s => {

      const cls =
        s.wind >= 18 ? "wind-high" :
        s.wind >= 8  ? "wind-mid" :
                       "wind-low";

      tbody.innerHTML += `
        <tr>
          <td>${s.name}</td>
          <td class="${cls}">${s.wind}</td>
          <td>${s.dir}</td>
          <td class="${cls}">${s.max}</td>
          <td>${s.maxTime}</td>
          <td>${s.last}</td>
        </tr>
      `;

    });

  } catch (err) {
    console.error("Errore caricamento vento.json:", err);
    document.querySelector(".updated").innerText =
      "Errore caricamento dati";
  }
}

/* ---------------- START + AUTO REFRESH ---------------- */

aggiorna();
setInterval(aggiorna, 5 * 60 * 1000);

</script>

</body>
</html>
